    <meta charset="UTF-8">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #0ea5e9; 
            --text: #f1f5f9; --ans: #4ade80; --highlight: #f59e0b;
        }
        body.light-mode {
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --accent: #0284c7;
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        
        /* HERO SECTION */
        .hero { display: flex; width: 100%; height: 400px; border-bottom: 5px solid var(--accent); }
        .hero-pane { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        .hero-pane img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0.6; display: block; }
        .hero-content { position: relative; z-index: 2; text-align: center; background: rgba(0,0,0,0.6); padding: 20px; width: 100%; color: white; }

        /* STICKY NAV */
        .sticky-controls { position: sticky; top: 0; z-index: 1000; background: var(--bg); border-bottom: 2px solid var(--accent); padding: 15px; }
        .nav-dash { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .nav-btn { padding: 8px 15px; background: var(--card); border: 1px solid var(--accent); color: var(--text); cursor: pointer; text-decoration: none; border-radius: 5px; font-size: 0.85rem; font-weight: bold; }
        .nav-btn:hover { background: var(--accent); color: white; }
        
        .toolbar { display: flex; justify-content: center; gap: 15px; align-items: center; }
        .search-bar { width: 40%; padding: 12px 20px; border-radius: 25px; border: 2px solid var(--accent); background: var(--card); color: var(--text); outline: none; }
        .icon-btn { background: var(--accent); border: none; color: white; padding: 10px; border-radius: 50%; cursor: pointer; width: 45px; height: 45px; font-size: 1.2rem; }

        /* FEATURES GRID */
        .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1100px; margin: 25px auto; padding: 0 20px; }
        .feature-box { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--accent); }
        .flashcard { height: 160px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.3rem; font-weight: bold; padding: 20px; border: 2px dashed var(--accent); border-radius: 10px; margin-top: 10px; }
        .xp-display { font-size: 1.6rem; color: var(--highlight); font-weight: bold; }

        /* TABLES */
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .topic-head { background: var(--accent); color: white; padding: 15px; border-radius: 5px; margin-top: 50px; font-size: 2rem; font-weight: 800; scroll-margin-top: 200px; }
        .sub-head { color: var(--highlight); font-size: 1.5rem; margin: 30px 0 10px; border-left: 5px solid var(--highlight); padding-left: 10px; scroll-margin-top: 200px; }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; margin-bottom: 50px; table-layout: fixed; }
        th { background: #000; color: var(--accent); padding: 15px; text-align: left; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #334155; word-wrap: break-word; }
        .ans-txt { color: var(--ans); font-weight: bold; }
        .audio-btn { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--accent); }

        @media print { .hero, .sticky-controls, .features-grid, .audio-btn { display: none !important; } table { color: black; background: white; width: 100%; } }

// --- UTILS ---
function toggleTheme() { document.body.classList.toggle('light-mode'); }

// UPDATED: SAYS BOTH QUESTION AND ANSWER
function say(q, a) { 
    window.speechSynthesis.cancel(); 
    const utterance = new SpeechSynthesisUtterance(`${q}. The answer is ${a}`);
    window.speechSynthesis.speak(utterance); 
}

function doSearch() {
    let v = document.getElementById('mainSearch').value.toLowerCase();
    document.querySelectorAll('tbody tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? "" : "none");
}

function startVoice() {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.onresult = (e) => { document.getElementById('mainSearch').value = e.results[0][0].transcript; doSearch(); };
    rec.start();
}

// --- INTERACTIVE ---
let xp = 0;
let flashState = 'q';
let currentF = null;
function flipCard() {
    const display = document.getElementById('card');
    if(!currentF || flashState === 'a') {
        const keys = ['h1','h2','h3','s1','s2','s3'];
        currentF = db[keys[Math.floor(Math.random()*6)]][Math.floor(Math.random()*50)];
        display.innerText = currentF[0]; display.style.color = "var(--text)"; flashState = 'q';
    } else {
        display.innerText = currentF[1]; display.style.color = "var(--ans)"; flashState = 'a';
    }
}

let qObj = null;
function nextQ() {
    const keys = ['h1','h2','h3','s1','s2','s3'];
    qObj = db[keys[Math.floor(Math.random()*6)]][Math.floor(Math.random()*50)];
    document.getElementById('quiz-q').innerText = qObj[0];
}
function checkQuiz() {
    const val = document.getElementById('quiz-a').value.trim().toLowerCase();
    const correctAns = qObj[1].toLowerCase();
    if(val === correctAns || (val.length > 2 && correctAns.includes(val))) {
        xp += 100; document.getElementById('xpCount').innerText = xp;
        alert("Correct! +100 XP"); nextQ(); document.getElementById('quiz-a').value = "";
    } else { alert("Incorrect. The answer was: " + qObj[1]); nextQ(); }
}

window.onload = () => { render(); nextQ(); };
